<!DOCTYPE html>
<html lang="pt-BR" data-tema="escuro"> <!-- EDITE: troque "escuro" por "claro" se quiser começar no tema claro -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>João Gabriel · Portfólio</title>
<meta name="description" content="Portfólio pessoal de João Gabriel — 15 anos, gamer, nerd e um pouco de tudo.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">

<!-- Fontes -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Caveat:wght@500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   TEMAS — cores do "caderno". Pode trocar os códigos à vontade!
   Tema claro = caderno de papel branco.
   Tema escuro = caderno de papel preto + caneta gel (padrão).
   ============================================================ */
:root{
  --papel:      #FBFBF8;                 /* fundo, cor de papel */
  --linha:      rgba(62,123,250,.09);    /* linhas do quadriculado */
  --tinta:      #23213A;                 /* texto principal */
  --suave:      #5B5875;                 /* texto secundário */
  --superficie: #FFFFFF;                 /* fundo de cards */
  --nav-bg:     rgba(251,251,248,.88);
  --sombra:     rgba(35,33,58,.16);
  --amarelo: #FFD23F;
  --rosa:    #FF5D8F;
  --azul:    #3E7BFA;
  --menta:   #2EC4B6;
  --laranja: #FF9F1C;
  --tinta-fixa: #23213A; /* texto/traço sobre cores vivas (igual nos 2 temas) */
}

html[data-tema="escuro"]{
  --papel:      #161528;
  --linha:      rgba(126,146,255,.08);
  --tinta:      #F2F0FF;
  --suave:      #A9A6CB;
  --superficie: #201E38;
  --nav-bg:     rgba(22,21,40,.86);
  --sombra:     rgba(0,0,0,.45);
  --azul:  #5D8CFF;
  --rosa:  #FF6E9C;
  --menta: #2EE6C5;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html{ scroll-behavior:smooth; }

body{
  font-family:'Instrument Sans', system-ui, sans-serif;
  color:var(--tinta);
  background-color:var(--papel);
  /* papel quadriculado ↓ */
  background-image:
    linear-gradient(var(--linha) 1px, transparent 1px),
    linear-gradient(90deg, var(--linha) 1px, transparent 1px);
  background-size:28px 28px;
  line-height:1.6;
  overflow-x:hidden;
  transition:background-color .3s ease, color .3s ease;
}

.container{ max-width:1020px; margin:0 auto; padding:0 20px; }

::selection{ background:var(--amarelo); color:var(--tinta-fixa); }

a{ color:var(--azul); }
:focus-visible{ outline:3px solid var(--azul); outline-offset:3px; border-radius:6px; }

/* fonte manuscrita (as "anotações") */
.mao{ font-family:'Caveat', cursive; }

/* texto com marca-texto */
.marca{
  background:linear-gradient(104deg, transparent 1%, var(--cor-marca, var(--amarelo)) 4%, var(--cor-marca, var(--amarelo)) 96%, transparent 99%);
  color:var(--tinta-fixa);
  padding:.05em .25em;
  border-radius:.25em;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
}

/* ===================== NAVEGAÇÃO ===================== */
nav{
  position:sticky; top:0; z-index:50;
  background:var(--nav-bg);
  backdrop-filter:blur(8px);
  border-bottom:2px solid var(--tinta);
}
.nav-inner{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding:12px 20px; max-width:1020px; margin:0 auto; flex-wrap:wrap;
}
.logo{
  font-family:'Caveat', cursive; font-weight:700; font-size:1.7rem;
  color:var(--tinta); text-decoration:none; white-space:nowrap;
}
.logo span{ color:var(--rosa); }
.nav-dir{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.nav-links{ display:flex; gap:6px; flex-wrap:wrap; }
.nav-links a{
  font-size:.85rem; font-weight:600; text-decoration:none; color:var(--tinta);
  padding:6px 12px; border-radius:999px; border:2px solid transparent;
  transition:border-color .15s, background .15s;
}
.nav-links a:hover{ border-color:var(--tinta); background:var(--superficie); }

/* botão de tema (☀️/🌙) */
.tema-btn{
  width:40px; height:40px; border-radius:50%;
  border:2px solid var(--tinta); background:var(--superficie);
  cursor:pointer; font-size:1.1rem; line-height:1;
  display:flex; align-items:center; justify-content:center;
  box-shadow:2px 2px 0 var(--amarelo);
  transition:transform .15s ease;
}
.tema-btn:hover{ transform:rotate(20deg) scale(1.05); }

/* ===================== HERO ===================== */
header{
  position:relative;
  padding:72px 0 88px;
  overflow:hidden;
}
.etiqueta{
  display:inline-block;
  font-size:.75rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  background:var(--superficie); border:2px solid var(--tinta); border-radius:999px;
  padding:6px 14px; box-shadow:3px 3px 0 var(--menta);
  margin-bottom:22px;
}
h1{
  font-family:'Bricolage Grotesque', sans-serif;
  font-weight:800;
  font-size:clamp(2.3rem, 7.5vw, 4.4rem);
  line-height:1.08;
  letter-spacing:-.02em;
  max-width:17ch;
}
h1 .gira-caixa{ display:inline-block; }
#palavra-gira{
  display:inline-block;
  transition:opacity .26s ease, transform .26s ease;
}
.sub-hero{
  margin-top:22px; font-size:1.1rem; color:var(--suave); max-width:46ch;
}
.rabisco{ display:block; margin-top:10px; width:min(260px, 60%); height:auto; }

/* anotação manuscrita com seta */
.nota-hero{
  font-family:'Caveat', cursive; font-size:1.35rem; font-weight:600;
  color:var(--rosa); margin-top:26px; display:flex; align-items:center; gap:8px;
}
.nota-hero svg{ flex:none; }

/* adesivo redondo "15 anos" */
.selo{
  position:absolute; right:4%; top:70px;
  width:118px; height:118px; border-radius:50%;
  background:var(--amarelo); border:2px solid var(--tinta-fixa);
  color:var(--tinta-fixa);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transform:rotate(10deg);
  box-shadow:4px 4px 0 var(--sombra);
  text-align:center;
}
.selo::before{
  content:""; position:absolute; inset:6px; border-radius:50%;
  border:2px dashed var(--tinta-fixa);
}
.selo b{ font-family:'Bricolage Grotesque', sans-serif; font-size:2rem; line-height:1; }
.selo small{ font-family:'Caveat', cursive; font-size:1.05rem; font-weight:700; }

/* estrelinha decorativa */
.estrela{ position:absolute; left:58%; bottom:36px; transform:rotate(-12deg); }

/* ===================== SEÇÕES ===================== */
section{ padding:72px 0; }

.cabecalho-secao{ margin-bottom:36px; }
.olho{
  font-family:'Caveat', cursive; font-size:1.4rem; font-weight:700;
  display:block; margin-bottom:4px;
}
h2{
  font-family:'Bricolage Grotesque', sans-serif;
  font-weight:800; font-size:clamp(1.7rem, 4.5vw, 2.5rem);
  letter-spacing:-.01em; display:inline-block;
}

/* fita adesiva (usada em vários lugares) */
.fita{ position:relative; }
.fita::before{
  content:""; position:absolute; top:-14px; left:50%;
  width:96px; height:26px; transform:translateX(-50%) rotate(-3deg);
  background:rgba(255,210,63,.55);
  border-left:1px dashed rgba(35,33,58,.25);
  border-right:1px dashed rgba(35,33,58,.25);
}

/* ---------- SOBRE ---------- */
.sobre-grid{
  display:grid; grid-template-columns:280px 1fr; gap:44px; align-items:start;
}
.polaroid{
  background:var(--superficie); border:2px solid var(--tinta);
  padding:12px 12px 46px; transform:rotate(-3deg);
  box-shadow:6px 6px 0 var(--sombra);
}
.polaroid .foto-img{
  width:100%; aspect-ratio:1/1; object-fit:cover; display:block;
  border:2px solid var(--tinta);
}
.polaroid figcaption{
  font-family:'Caveat', cursive; font-size:1.3rem; text-align:center; margin-top:12px;
}
.sobre-texto p{ margin-bottom:16px; }
.fatos{
  display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; list-style:none;
}
.fatos li{
  background:var(--superficie); border:2px solid var(--tinta); border-radius:999px;
  padding:7px 15px; font-size:.88rem; font-weight:600;
  box-shadow:3px 3px 0 var(--cor, var(--amarelo));
}

/* ---------- COISAS QUE EU CURTO ---------- */
.curto-grid{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
  gap:20px;
}
.adesivo{
  background:var(--superficie); border:2px solid var(--tinta); border-radius:16px;
  padding:22px 16px 18px; text-align:center;
  box-shadow:5px 5px 0 var(--cor, var(--amarelo));
  transition:transform .18s ease, box-shadow .18s ease;
}
.adesivo:nth-child(odd){ transform:rotate(-1.6deg); }
.adesivo:nth-child(even){ transform:rotate(1.6deg); }
.adesivo:hover{ transform:rotate(0) translateY(-5px); box-shadow:7px 8px 0 var(--cor, var(--amarelo)); }
.adesivo .icone{
  width:46px; height:46px; margin:0 auto 12px; border-radius:12px;
  background:var(--cor, var(--amarelo)); border:2px solid var(--tinta-fixa);
  display:flex; align-items:center; justify-content:center; font-size:1.3rem;
}
.adesivo h3{ font-family:'Bricolage Grotesque', sans-serif; font-size:1.05rem; font-weight:700; }
.adesivo p{ font-size:.83rem; color:var(--suave); margin-top:4px; }

/* ---------- APRENDENDO ---------- */
.lista-aprender{ list-style:none; max-width:640px; }
.lista-aprender li{
  display:flex; align-items:center; gap:14px;
  padding:14px 4px; border-bottom:2px dashed rgba(150,150,180,.3);
  font-weight:500;
}
.caixinha{
  flex:none; width:26px; height:26px; border:2px solid var(--tinta);
  border-radius:7px; background:var(--superficie); position:relative;
}
li.feito .caixinha{ background:var(--menta); border-color:var(--tinta-fixa); }
li.feito .caixinha::after{
  content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Caveat', cursive; font-weight:700; font-size:1.25rem; color:var(--tinta-fixa);
}
li.fazendo .caixinha{ background:var(--amarelo); border-color:var(--tinta-fixa); }
li.fazendo .caixinha::after{
  content:"…"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-weight:800; letter-spacing:.05em; font-size:.95rem; padding-bottom:6px; color:var(--tinta-fixa);
}
.status{
  margin-left:auto; font-family:'Caveat', cursive; font-size:1.15rem; font-weight:700;
  color:var(--suave); white-space:nowrap;
}
li.feito .status{ color:var(--menta); }
li.fazendo .status{ color:var(--laranja); }

/* ---------- PROJETOS ---------- */
.projetos-grid{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:22px;
}
.projeto{
  background:var(--superficie); border:2px solid var(--tinta); border-radius:16px;
  padding:26px 22px; box-shadow:5px 5px 0 var(--cor, var(--azul));
  display:flex; flex-direction:column; gap:8px;
}
.projeto .tag{
  align-self:flex-start; font-size:.72rem; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; background:var(--cor, var(--azul));
  border:2px solid var(--tinta-fixa); color:var(--tinta-fixa);
  border-radius:999px; padding:3px 10px;
}
.projeto h3{ font-family:'Bricolage Grotesque', sans-serif; font-size:1.2rem; }
.projeto p{ font-size:.92rem; color:var(--suave); }
.projeto-links{ margin-top:auto; padding-top:6px; font-size:.88rem; font-weight:700; }
.projeto-links a{ text-decoration:none; }
.projeto-links a:hover{ text-decoration:underline; }

/* ---------- SONHOS (post-its) ---------- */
.postits{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:26px;
}
.postit{
  min-height:170px; padding:44px 20px 20px;
  background:var(--cor, var(--amarelo));
  border:2px solid rgba(35,33,58,.25);
  box-shadow:5px 6px 0 var(--sombra);
  color:var(--tinta-fixa);
  font-family:'Caveat', cursive; font-size:1.5rem; font-weight:600; line-height:1.25;
}
.postit:nth-child(1){ transform:rotate(-2deg); }
.postit:nth-child(2){ transform:rotate(1.5deg); }
.postit:nth-child(3){ transform:rotate(-1deg); }
.postit:nth-child(4){ transform:rotate(2deg); }
.postit:nth-child(5){ transform:rotate(-1.5deg); }

/* ---------- CONTATO ---------- */
.contato-caixa{
  background:var(--superficie); border:2px solid var(--tinta); border-radius:20px;
  padding:44px 28px; text-align:center; box-shadow:7px 7px 0 var(--rosa);
  max-width:640px; margin:0 auto;
}
.contato-caixa .mao{ font-size:2.3rem; font-weight:700; color:var(--rosa); }
.contato-caixa p{ color:var(--suave); margin:10px auto 24px; max-width:40ch; }
.canais{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
.canais a, .canais .canal{
  display:inline-flex; align-items:center; gap:8px;
  text-decoration:none; color:var(--tinta); font-weight:600; font-size:.92rem;
  background:var(--papel); border:2px solid var(--tinta); border-radius:999px;
  padding:9px 18px; box-shadow:3px 3px 0 var(--cor, var(--azul));
  transition:transform .15s ease;
}
.canais svg{ width:16px; height:16px; flex:none; }
.canais a:hover{ transform:translateY(-3px); }

/* ---------- RODAPÉ ---------- */
footer{
  border-top:2px solid var(--tinta); padding:34px 20px 28px; text-align:center;
  font-family:'Caveat', cursive; font-size:1.25rem;
}
footer .lema{
  font-size:1.7rem; font-weight:700; line-height:1.5;
  max-width:34ch; margin:0 auto 14px;
}

/* ---------- EXTRAS: no momento, trilha sonora, easter egg ---------- */
.selo{ cursor:pointer; user-select:none; }

.no-momento{
  margin-top:28px; max-width:340px;
  background:var(--amarelo); color:var(--tinta-fixa);
  border:2px solid rgba(35,33,58,.25);
  box-shadow:5px
